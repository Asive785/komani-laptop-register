<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Laptop Assignment Register</title>
<meta name="description" content="Learner laptop asset register — record your name, laptop name and serial number." />
<style>
  :root {
    --bg: #ffffff;
    --card: #ffffff;
    --surface: #f8f8f8;
    --border: #e5e5e5;
    --text: #000000;
    --muted: #555555;
    --primary: #15803d;       /* green */
    --primary-hover: #166534;
    --accent: #facc15;        /* yellow */
    --success: #15803d;
    --danger: #dc2626;        /* red */
    --radius: 12px;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body {
    min-height: 100vh;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, sans-serif;
    background: #ffffff;
    color: var(--text);
    display: flex;
    justify-content: center;
    padding: 32px 16px 64px;
    border-top: 6px solid var(--accent);
  }
  .container {
    width: 100%;
    max-width: 560px;
  }
  header { margin-bottom: 24px; text-align: center; }
  header h1 {
    font-size: 1.75rem;
    margin: 0 0 8px;
    letter-spacing: -0.02em;
  }
  header p { color: var(--muted); margin: 0; font-size: 0.95rem; }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    box-shadow: 0 4px 16px rgba(0,0,0,0.08);
  }
  .card { border-top: 4px solid var(--primary); }
  .field { margin-bottom: 16px; }
  label {
    display: block;
    font-size: 0.85rem;
    font-weight: 600;
    margin-bottom: 6px;
    color: var(--muted);
  }
  input {
    width: 100%;
    padding: 12px 14px;
    font-size: 1rem;
    color: var(--text);
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus {
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(21,128,61,0.20);
  }
  button {
    width: 100%;
    padding: 13px 16px;
    font-size: 1rem;
    font-weight: 600;
    color: white;
    background: var(--primary);
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: background .15s, transform .05s;
    margin-top: 8px;
  }
  button:hover:not(:disabled) { background: var(--primary-hover); }
  button:active:not(:disabled) { transform: translateY(1px); }
  button:disabled { opacity: 0.6; cursor: not-allowed; }
  .status {
    margin-top: 16px;
    padding: 12px 14px;
    border-radius: 10px;
    font-size: 0.9rem;
    display: none;
  }
  .status.show { display: block; }
  .status.success { background: #ecfdf5; color: #14532d; border: 1px solid #15803d; }
  .status.error   { background: #fef2f2; color: #7f1d1d; border: 1px solid #dc2626; }
  footer {
    text-align: center;
    color: var(--muted);
    font-size: 0.8rem;
    margin-top: 24px;
  }
</style>
</head>
<body>
  <div class="container">
    <header>
      <h1>💻 Laptop Register</h1>
      <p>Please record the laptop assigned to you.</p>
    </header>

    <form id="form" class="card" autocomplete="on" novalidate>
      <div class="field">
        <label for="name">First name</label>
        <input id="name" name="name" required maxlength="60" placeholder="Asive" />
      </div>
      <div class="field">
        <label for="surname">Surname</label>
        <input id="surname" name="surname" required maxlength="60" placeholder="Jane" />
      </div>
      <div class="field">
        <label for="laptop">Laptop name / model</label>
        <input id="laptop" name="laptop" required maxlength="80" placeholder="PAICTA-NSF 000" />
      </div>
      <div class="field">
        <label for="serial">Serial number</label>
        <input id="serial" name="serial" required maxlength="60" placeholder="ABC123XYZ" />
      </div>
      <button id="submitBtn" type="submit">Submit</button>
      <div id="status" class="status" role="status" aria-live="polite"></div>
    </form>

    <footer>Your entry is saved to the class register.</footer>
  </div>

<script>
  // 1) Paste your Google Apps Script Web App URL here (see README).
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzUwJb3R-3SQCTeDjThaTqk5tKUS-NKjsYxrlZaYTSmfyKGJAmmU2LYLyJWn9hhUfxA2Q/exec";

  const form = document.getElementById("form");
  const btn = document.getElementById("submitBtn");
  const statusEl = document.getElementById("status");

  function showStatus(type, msg) {
    statusEl.className = "status show " + type;
    statusEl.textContent = msg;
  }

  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    statusEl.className = "status";

    const data = {
      name: form.name.value.trim(),
      surname: form.surname.value.trim(),
      laptop: form.laptop.value.trim(),
      serial: form.serial.value.trim(),
      timestamp: new Date().toISOString(),
    };

    if (!data.name || !data.surname || !data.laptop || !data.serial) {
      showStatus("error", "Please fill in all fields.");
      return;
    }

    if (!SCRIPT_URL || SCRIPT_URL.includes("PASTE_YOUR")) {
      showStatus("error", "Setup incomplete: the script URL has not been configured.");
      return;
    }

    btn.disabled = true;
    btn.textContent = "Submitting…";

    try {
      // Using text/plain avoids a CORS preflight with Apps Script.
      await fetch(SCRIPT_URL, {
        method: "POST",
        mode: "no-cors",
        headers: { "Content-Type": "text/plain;charset=utf-8" },
        body: JSON.stringify(data),
      });
      form.reset();
      showStatus("success", "✅ Recorded. Thank you, " + data.name + "!");
    } catch (err) {
      showStatus("error", "Could not submit. Please try again or tell your facilitator.");
    } finally {
      btn.disabled = false;
      btn.textContent = "Submit";
    }
  });
</script>
</body>
</html>
